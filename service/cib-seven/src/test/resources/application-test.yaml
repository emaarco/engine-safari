spring:
  main:
    web-application-type: none
    allow-bean-definition-overriding: true
  autoconfigure:
    # The engine-rest (Jersey) API needs a servlet web context, which the process
    # tests don't start (web-application-type: none). It is only needed at runtime.
    exclude:
      - org.cibseven.bpm.spring.boot.starter.rest.CamundaBpmRestJerseyAutoConfiguration
  datasource:
    url: jdbc:h2:mem:engine-safari-test;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

camunda:
  bpm:
    admin-user:
      id: admin
      password: admin
    database:
      type: h2
      schema-update: true
    job-execution:
      enabled: false
    webapp:
      enabled: false
